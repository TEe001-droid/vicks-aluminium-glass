<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 820 220"
     width="820"
     height="220"
     role="img"
     aria-labelledby="title desc">
  <title id="title">VICKS Aluminium Glass Gutters Logo</title>
  <desc id="desc">
    Premium modern logo for Vicks Aluminium Glass Gutters.
  </desc>
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3BC6FF"/>
      <stop offset="100%" stop-color="#0D8BE8"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1BA34A"/>
      <stop offset="100%" stop-color="#36D46A"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <g transform="translate(20 25)">
    <!-- Aluminium frame -->
    <polygon
      points="70,150 110,20 150,150 128,150 110,90 92,150"
      fill="#111111"/>
    <!-- Glass panel -->
    <polygon
      points="110,42 132,108 110,92 88,108"
      fill="url(#glass)"
      opacity="0.95"/>
    <!-- Base accent -->
    <rect
      x="40"
      y="165"
      width="140"
      height="7"
      rx="3.5"
      fill="url(#green)"/>
  </g>
  <!-- Wordmark -->
  <text
    x="210"
    y="98"
    font-family="Montserrat, Poppins, Arial, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#111111"
    letter-spacing="3">
    VICKS
  </text>
  <!-- Accent line -->
  <rect
    x="212"
    y="112"
    width="265"
    height="6"
    rx="3"
    fill="url(#green)"/>
  <!-- Tagline -->
  <text
    x="212"
    y="156"
    font-family="Montserrat, Arial, sans-serif"
    font-size="22"
    font-weight="600"
    fill="#666666"
    letter-spacing="2">
    ALUMINIUM • GLASS • GUTTERS
  </text>
</svg>
