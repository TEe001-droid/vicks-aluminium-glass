<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f4f7f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </radialGradient>
    <linearGradient id="metalLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="70%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="50%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glassCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="glassStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bgGlow)"/>
  <g filter="url(#softShadow)">
    <rect x="100" y="60" width="600" height="680" rx="16" fill="#ffffff"/>
    <rect x="100" y="60" width="600" height="680" rx="16" fill="url(#metalLight)" opacity="0.15"/>
    <rect x="101" y="61" width="598" height="678" rx="15" fill="none" stroke="url(#metalLight)" stroke-width="2" opacity="0.5"/>
  </g>
  <g filter="url(#dropShadow)" transform="translate(0, -10)">
    <path d="M 400 130 L 590 270 L 550 300 L 400 190 L 250 300 L 210 270 Z" fill="url(#metalDark)"/>
    <path d="M 190 280 L 230 280 L 240 320 L 300 320 L 310 360 L 260 360 L 250 335 L 190 335 Z" fill="url(#metalLight)" stroke="url(#metalDark)" stroke-width="1.5"/>
    <path d="M 610 280 L 570 280 L 560 320 L 500 320 L 490 360 L 540 360 L 550 335 L 610 335 Z" fill="url(#metalLight)" stroke="url(#metalDark)" stroke-width="1.5"/>
    <polygon points="400,195 490,360 430,360 400,300 370,360 310,360" fill="url(#glassCyan)" stroke="url(#glassStroke)" stroke-width="2"/>
    <path d="M 280 240 L 340 240 L 400 350 L 460 240 L 520 240 L 420 410 L 380 410 Z" fill="url(#metalDark)"/>
    <path d="M 280 240 L 340 240 L 400 350 L 460 240 L 520 240 L 420 410 L 380 410 Z" fill="url(#metalLight)" opacity="0.3"/>
    <rect x="350" y="315" width="100" height="15" fill="url(#metalLight)" stroke="url(#metalDark)" stroke-width="1"/>
  </g>
  <text x="400" y="505" font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif" font-weight="900" font-size="82" fill="url(#metalDark)" text-anchor="middle" letter-spacing="4">VICKS</text>
  <line x1="220" y1="530" x2="580" y2="530" stroke="url(#metalLight)" stroke-width="4" stroke-linecap="round"/>
  <text x="400" y="565" font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif" font-weight="700" font-size="28" fill="#0284c7" text-anchor="middle" letter-spacing="6">ALUMINIUM AND GLASS</text>
  <g transform="translate(400, 620)">
    <rect x="-260" y="-15" width="520" height="85" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="0" y="15" font-family="'Arial', sans-serif" font-weight="700" font-size="16" fill="#475569" text-anchor="middle" letter-spacing="1.5">GUTTERS • WINDOWS • DOORS</text>
    <text x="0" y="45" font-family="'Arial', sans-serif" font-weight="700" font-size="16" fill="#475569" text-anchor="middle" letter-spacing="1.5">GARAGE DOORS • CARPORTS</text>
  </g>
</svg>
